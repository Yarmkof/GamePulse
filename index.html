<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yarmkof GamePulse</title>
  <link rel="icon" href="assets/icons/logo.svg" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <img src="assets/icons/logo.svg" alt="GamePulse" />
      <div><strong>Yarmkof</strong><span>GamePulse Live</span></div>
    </div>
    <button class="nav active" data-view="live">⚽ Matchs live</button>
    <button class="nav" data-view="calendar">📅 Calendrier</button>
    <button class="nav" data-view="competitions">🏆 Compétitions</button>
    <button class="nav" data-view="teams">🔎 Recherche équipe</button>
    <button class="nav" data-view="alerts">🔔 Alertes</button>
    <button class="nav" id="themeBtn">🌙 Mode sombre</button>
    <p class="version">V4 Live · TheSportsDB API gratuite</p>
  </aside>

  <main class="app">
    <header class="hero">
      <div>
        <p class="pill">🏆 Données sportives gratuites · API key 123</p>
        <h1>Yarmkof <span>GamePulse</span></h1>
        <p>Scores, calendrier, compétitions et recherche d’équipes via TheSportsDB.</p>
      </div>
      <div class="searchbar">
        <input id="teamSearch" placeholder="Rechercher une équipe : PSG, Arsenal..." />
        <button id="searchBtn">Rechercher</button>
      </div>
    </header>

    <section class="stats">
      <div><strong id="statEvents">--</strong><span>Événements chargés</span></div>
      <div><strong id="statLeagues">--</strong><span>Compétitions</span></div>
      <div><strong>100%</strong><span>Gratuit</span></div>
      <div><strong>API</strong><span>TheSportsDB</span></div>
    </section>

    <section id="status" class="status">Chargement...</section>
    <section id="content" class="content"></section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
