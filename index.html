<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yarmkof GamePulse V5 World Cup AI</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="./assets/icons/logo.svg" alt="GamePulse" />
        <div><strong>Yarmkof</strong><span>GamePulse AI</span></div>
      </div>
      <nav>
        <button class="nav active" data-view="live">⚽ Matchs CDM</button>
        <button class="nav" data-view="calendar">📅 Calendrier</button>
        <button class="nav" data-view="bracket">🏆 Tableau</button>
        <button class="nav" data-view="ai">🤖 Analyse IA</button>
        <button class="nav" data-view="teams">🌍 Équipes</button>
        <button class="nav" data-view="alerts">🔔 Alertes</button>
        <button class="nav theme" id="themeBtn">☀️ Mode clair</button>
      </nav>
      <div class="version">V5 · Coupe du Monde + IA prédictive<br/>Source démo : dataset CDM intégré</div>
    </aside>

    <main>
      <header class="hero">
        <div>
          <span class="pill">🏆 Coupe du Monde 2026 · Module IA</span>
          <h1>Yarmkof <span>GamePulse</span></h1>
          <p>Matchs, scores, calendrier, tableau final et estimation du vainqueur avec une IA de simulation.</p>
        </div>
        <div class="searchbox">
          <input id="search" placeholder="Rechercher : France, Brésil, Allemagne..." />
          <button id="searchBtn">Rechercher</button>
        </div>
      </header>

      <section class="stats">
        <div><strong id="statLive">0</strong><span>Matchs live</span></div>
        <div><strong id="statDone">0</strong><span>Terminés</span></div>
        <div><strong id="statNext">0</strong><span>À venir</span></div>
        <div><strong id="statAI">--</strong><span>Match IA sélectionné</span></div>
      </section>

      <section id="content" class="content"></section>
    </main>
  </div>
  <script src="./assets/js/app.js"></script>
</body>
</html>
